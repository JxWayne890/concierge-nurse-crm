name: Sync to client fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to client fork
        run: |
          git remote add client https://x-access-token:${{ secrets.CLIENT_FORK_PAT }}@github.com/${{ secrets.CLIENT_FORK_REPO }}.git
          git push client main --force
